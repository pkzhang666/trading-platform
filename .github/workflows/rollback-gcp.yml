name: Roll Back GCP GKE Canary

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: prod

concurrency:
  group: deploy-gke-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: trading platform

    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      CLUSTER_NAME: trading-platform-${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra/terraform/gcp-gke init

      - name: Export GKE runtime outputs
        run: |
          echo "API_GSA_EMAIL=$(terraform -chdir=infra/terraform/gcp-gke output -raw api_workload_service_account_email)" >> $GITHUB_ENV
          echo "CLOUD_SQL_INSTANCE_CONNECTION_NAME=$(terraform -chdir=infra/terraform/gcp-gke output -raw cloud_sql_instance_connection_name)" >> $GITHUB_ENV
          echo "DATABASE_URL_SECRET_NAME=$(terraform -chdir=infra/terraform/gcp-gke output -raw database_url_secret_name)" >> $GITHUB_ENV
          echo "PASSWORD_PEPPER_SECRET_NAME=$(terraform -chdir=infra/terraform/gcp-gke output -raw password_pepper_secret_name)" >> $GITHUB_ENV
          echo "BOOTSTRAP_ADMIN_PASSWORD_SECRET_NAME=$(terraform -chdir=infra/terraform/gcp-gke output -raw bootstrap_admin_password_secret_name)" >> $GITHUB_ENV
          echo "BOOTSTRAP_TRADER_PASSWORD_SECRET_NAME=$(terraform -chdir=infra/terraform/gcp-gke output -raw bootstrap_trader_password_secret_name)" >> $GITHUB_ENV
          echo "SECRET_MANAGER_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Roll back canary
        run: bash .github/scripts/gke-rollback.sh trading-platform
