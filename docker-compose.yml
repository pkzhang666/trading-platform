services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 4000
      API_HOST: 0.0.0.0
      DATA_FILE: /app/data/demo-exchange.json
      JWT_SECRET: docker-demo-secret
    volumes:
      - exchange-data:/app/data
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "3000:80"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "3001:80"

volumes:
  exchange-data:
